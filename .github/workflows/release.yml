name: Release

on:
  release:
    types: [published]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer

      - name: Install PHP dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Verify vendor directory
        run: |
          if [ ! -f vendor/yahnis-elsts/plugin-update-checker/load-v5p6.php ]; then
            echo "Error: vendor/yahnis-elsts/plugin-update-checker not found after composer install"
            exit 1
          fi
          echo "vendor/ OK"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build zip
        run: node scripts/build-zip.mjs

      - name: Upload zip to release
        run: gh release upload ${{ github.event.release.tag_name }} release/charrua-maintenance-helper.zip --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
